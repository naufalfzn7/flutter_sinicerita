name: sinicerita
description: "SiniCerita — Platform kesehatan mental berbasis chatbot AI untuk curhat dan refleksi emosional."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP client
  dio: ^5.4.0

  # Encrypted token storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.0

  # Navigation
  go_router: ^13.0.0

  # Image caching
  cached_network_image: ^3.3.0

  # SVG rendering
  flutter_svg: ^2.0.10

  # Loading skeleton
  shimmer: ^3.0.0

  # Avatar upload
  image_picker: ^1.0.0

  # OTP input
  pin_code_fields: ^8.0.1

  # Date formatting
  intl: ^0.19.0

  # Value equality
  equatable: ^2.0.5

  # Collection utilities (firstWhereOrNull)
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Property-based testing
  glados: ^1.1.1

  # Launcher icon generator
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
